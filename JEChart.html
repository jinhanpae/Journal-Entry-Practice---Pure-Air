<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chart of Accounts</title>

  <!-- Simple inline styles for the popup -->
  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      margin: 16px;
      background: #f9fafb;
      color: #111827;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 8px;
    }
    p {
      font-size: 12px;
      color: #6b7280;
      margin: 0 0 10px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #ffffff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
      font-size: 13px;
    }
    th, td {
      border: 1px solid #e5e7eb;
      padding: 6px 8px;
    }
    th {
      background: #f3f4f6;
      text-align: left;
    }
  </style>
</head>
<body>
  <h1 id="chart-title"></h1>
  <p id="chart-subtitle"></p>
  <table id="chart-table">
    <thead>
      <tr>
        <th style="width:15%;">Code</th>
        <th style="width:55%;">Account</th>
        <th style="width:30%;">Type</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <!-- Shared config and data -->
  <script src="JEConfig.js"></script>
  <script src="JEChartOfAccounts.js"></script>

  <!-- Popup-specific logic -->
  <script src="JEChartApp.js"></script>
</body>
</html>
